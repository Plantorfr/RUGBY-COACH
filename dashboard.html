<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Accueil — RugbyCoach</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#111111">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/auth.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #111; color: #fff; max-width: 390px; margin: 0 auto; padding-bottom: 80px; }

    /* HEADER */
    .header { padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .avatar { width: 36px; height: 36px; background: #F59E0B; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: #111; }
    .header-info { line-height: 1.3; }
    .header-info small { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
    .header-info strong { font-size: 14px; font-weight: 600; display: block; }
    .notif-btn { width: 36px; height: 36px; background: #1e1e1e; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; }

    /* SECTIONS */
    .section { padding: 0 20px; margin-bottom: 24px; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .section-title { font-size: 13px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; color: #888; }
    .section-link { font-size: 12px; color: #F59E0B; text-decoration: none; font-weight: 500; }

    /* EFFECTIF CARDS */
    .effectif-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .eff-card { background: #1e1e1e; border-radius: 12px; padding: 14px 12px; }
    .eff-card.yellow { background: #F59E0B; }
    .eff-card .val { font-size: 28px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
    .eff-card.yellow .val { color: #111; }
    .eff-card .val-label { font-size: 11px; color: #888; }
    .eff-card.yellow .val-label { color: #7a5500; }
    .eff-card .trend { font-size: 11px; color: #27ae60; margin-top: 4px; }

    /* FORME CARD */
    .forme-card { background: #F59E0B; border-radius: 14px; padding: 20px; }
    .forme-label { font-size: 11px; color: #7a5500; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; font-weight: 600; }
    .forme-score { font-size: 42px; font-weight: 800; color: #111; line-height: 1; margin-bottom: 6px; }
    .forme-desc { font-size: 13px; color: #7a5500; }

    /* INFIRMERIE */
    .injury-card { background: #1e1e1e; border-radius: 12px; padding: 14px 16px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
    .injury-dot { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .injury-dot.out { background: #C0392B; }
    .injury-dot.doubt { background: #2a2a2a; }
    .injury-info strong { font-size: 13px; font-weight: 600; display: block; margin-bottom: 2px; }
    .injury-info span { font-size: 12px; color: #888; }
    .injury-badge { margin-left: auto; background: #C0392B22; color: #C0392B; font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 20px; white-space: nowrap; }

    /* DERNIERS MATCHS */
    .match-card { background: #1e1e1e; border-radius: 12px; padding: 14px 16px; margin-bottom: 8px; }
    .match-teams { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .match-score-nous { color: #F59E0B; }
    .match-score-eux { color: #888; }
    .match-meta { font-size: 12px; color: #666; }
    .match-result { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; margin-left: 8px; }
    .win { background: #1a3a1a; color: #27ae60; }
    .loss { background: #3a1a1a; color: #C0392B; }

    /* BOTTOM NAV */
    .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 390px; background: #1a1a1a; border-top: 0.5px solid #2a2a2a; display: flex; align-items: center; padding: 8px 0; z-index: 100; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; text-decoration: none; cursor: pointer; background: none; border: none; }
    .nav-item span { font-size: 10px; color: #666; }
    .nav-item.active span { color: #F59E0B; }
    .nav-item svg { opacity: 0.4; }
    .nav-item.active svg { opacity: 1; }
    .nav-center { flex: 1; display: flex; justify-content: center; }
    .nav-plus { width: 48px; height: 48px; background: #F59E0B; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; margin-top: -20px; box-shadow: 0 4px 12px rgba(245,158,11,0.4); }

    .empty { color: #444; font-size: 13px; text-align: center; padding: 20px; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <div class="avatar" id="avatarInitials">C</div>
      <div class="header-info">
        <small>Bonjour,</small>
        <strong id="coachName">Coach</strong>
      </div>
    </div>
    <button class="notif-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    </button>
  </div>

  <!-- EFFECTIF -->
  <div class="section">
    <div class="section-header">
      <span class="section-title">Effectif · J-3</span>
      <a href="effectif.html" class="section-link">Tout voir ›</a>
    </div>
    <div class="effectif-grid">
      <div class="eff-card yellow">
        <div class="val" id="nbDispo">—</div>
        <div class="val-label">Disponibles</div>
        <div class="trend" style="color:#7a5500" id="trendDispo"></div>
      </div>
      <div class="eff-card">
        <div class="val" style="color:#e67e22" id="nbIncertain">—</div>
        <div class="val-label" style="color:#888">Incertains</div>
      </div>
      <div class="eff-card">
        <div class="val" style="color:#C0392B" id="nbOut">—</div>
        <div class="val-label" style="color:#888">Forfaits</div>
      </div>
    </div>
  </div>

  <!-- FORME -->
  <div class="section">
    <div class="section-header">
      <span class="section-title">Forme du moment</span>
      <span class="section-link" style="color:#888" id="nbMatchs"></span>
    </div>
    <div class="forme-card">
      <div class="forme-label">Bilan saison</div>
      <div class="forme-score" id="bilanScore">—</div>
      <div class="forme-desc" id="bilanDesc">Chargement...</div>
    </div>
  </div>

  <!-- INFIRMERIE -->
  <div class="section">
    <div class="section-header">
      <span class="section-title">Infirmerie</span>
      <a href="sante.html" class="section-link">Voir tout ›</a>
    </div>
    <div id="infirmerieList"><p class="empty">Aucun joueur blessé 💪</p></div>
  </div>

  <!-- DERNIERS MATCHS -->
  <div class="section">
    <div class="section-header">
      <span class="section-title">Derniers matchs</span>
      <a href="matchs.html" class="section-link">Voir tout ›</a>
    </div>
    <div id="matchsList"><p class="empty">Aucun match enregistré</p></div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item active">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#F59E0B" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      <span>Accueil</span>
    </a>
    <a href="effectif.html" class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span>Effectif</span>
    </a>
    <div class="nav-center">
      <button class="nav-plus" onclick="window.location.href='matchs.html'">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
    <a href="seances.html" class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>Séances</span>
    </a>
    <button class="nav-item" onclick="logout()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      <span>Plus</span>
    </button>
  </nav>

  <script>
    (async () => {
      const user = await requireAuth();
      if (!user) return;

      // Nom du coach
      const name = user.profile?.name || user.email.split('@')[0];
      document.getElementById('coachName').textContent = name;
      document.getElementById('avatarInitials').textContent = name.charAt(0).toUpperCase();

      // Effectif stats
      const { data: joueurs } = await window.supabaseClient.from('joueurs').select('*');
      if (joueurs) {
        const dispo = joueurs.filter(j => j.disponible).length;
        document.getElementById('nbDispo').textContent = dispo;
        document.getElementById('nbOut').textContent = joueurs.filter(j => !j.disponible).length;
      }

      // Blessés
      const { data: blesses } = await window.supabaseClient
        .from('sante').select('*, joueurs(nom, prenom)')
        .eq('resolved', false).order('created_at', { ascending: false }).limit(3);

      const infList = document.getElementById('infirmerieList');
      if (blesses && blesses.length > 0) {
        infList.innerHTML = blesses.map(b => `
          <div class="injury-card">
            <div class="injury-dot ${b.statut === 'out' ? 'out' : 'doubt'}">${b.statut === 'out' ? '🔴' : '🟡'}</div>
            <div class="injury-info">
              <strong>${b.joueurs?.prenom} ${b.joueurs?.nom}</strong>
              <span>${b.type_blessure}</span>
            </div>
            ${b.statut === 'out' ? '<span class="injury-badge">FORFAIT</span>' : ''}
          </div>`).join('');
      }

      // Derniers matchs
      const { data: matchs } = await window.supabaseClient
        .from('matchs').select('*').order('date_match', { ascending: false }).limit(4);

      const matchsList = document.getElementById('matchsList');
      if (matchs && matchs.length > 0) {
        const V = matchs.filter(m => m.score_nous > m.score_eux).length;
        const D = matchs.filter(m => m.score_nous < m.score_eux).length;
        const N = matchs.filter(m => m.score_nous === m.score_eux).length;
        document.getElementById('bilanScore').textContent = `${V}-${D}-${N}`;
        document.getElementById('bilanDesc').textContent = `${matchs.length} matchs joués cette saison`;
        document.getElementById('nbMatchs').textContent = `${matchs.length} matchs`;

        matchsList.innerHTML = matchs.map(m => {
          const win = m.score_nous > m.score_eux;
          const date = new Date(m.date_match).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' });
          return `<div class="match-card">
            <div class="match-teams">
              RCACP <span class="match-score-nous">${m.score_nous ?? '?'}</span>
              – <span class="match-score-eux">${m.score_eux ?? '?'}</span> ${m.adversaire}
              <span class="match-result ${win ? 'win' : 'loss'}">${win ? 'V' : 'D'}</span>
            </div>
            <div class="match-meta">${date} · ${m.lieu}</div>
          </div>`;
        }).join('');
      }
    })();
  </script>
</body>
</html>
