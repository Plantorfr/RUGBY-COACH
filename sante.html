<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Infirmerie — RugbyCoach</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0e15">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Roboto+Condensed:ital,wght@0,700;0,800;0,900;1,700;1,800;1,900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/auth.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0e15; --bg2: #131a26; --surface: #161e2c; --surface2: #1c2535;
      --border: #243049; --border-strong: #2f3d5a;
      --fg: #f4ecdb; --fg-mute: #9aa5b8; --fg-faint: #6b7689;
      --yellow: #ffd83a; --red: #ef4343;
      --display: "Roboto Condensed", system-ui, sans-serif;
      --sans: "Roboto", system-ui, sans-serif;
    }
    body { font-family: var(--sans); background: var(--bg); color: var(--fg); max-width: 390px; margin: 0 auto; padding-bottom: 90px; -webkit-font-smoothing: antialiased; }

    .appbar { display: flex; align-items: center; gap: 12px; padding: 14px 18px 16px; }
    .back-btn { width: 40px; height: 40px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); color: var(--fg); display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 20px; }
    .appbar h1 { font-family: var(--display); font-size: 22px; font-weight: 900; letter-spacing: -0.02em; }
    .add-btn { margin-left: auto; background: var(--yellow); color: var(--bg); border: none; border-radius: 10px; padding: 9px 16px; font-family: var(--display); font-size: 13px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 6px; }

    /* STATBLOCK */
    .statblock { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 0 18px 20px; }
    .statblock-cell { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 14px; display: flex; flex-direction: column; gap: 6px; }
    .statblock-lbl { font-family: var(--display); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--fg-mute); }
    .statblock-num { font-family: var(--display); font-size: 32px; font-weight: 900; letter-spacing: -0.04em; line-height: 1; }
    .statblock-num.red { color: var(--red); }
    .statblock-num.yellow { color: #f7d04a; }
    .statblock-num.green { color: #6fe09a; }

    /* SEGMENTS */
    .segments { display: flex; background: var(--bg2); border-radius: 12px; padding: 4px; border: 1px solid var(--border); margin: 0 18px 16px; }
    .segment { flex: 1; background: transparent; border: 0; padding: 9px 8px; font-family: var(--display); font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-mute); cursor: pointer; border-radius: 8px; transition: all 0.15s; }
    .segment.active { background: var(--bg); color: var(--yellow); border: 1px solid var(--border-strong); }

    .list { padding: 0 18px; display: flex; flex-direction: column; gap: 10px; }

    /* BLESSURE CARD */
    .blessure-card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; overflow: hidden; }
    .blessure-hd { padding: 14px 16px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
    .blessure-avatar { width: 44px; height: 44px; border-radius: 13px; background: rgba(239,67,67,0.12); display: flex; align-items: center; justify-content: center; font-family: var(--display); font-size: 15px; font-weight: 900; font-style: italic; color: var(--red); flex-shrink: 0; }
    .blessure-avatar.incertain { background: rgba(231,176,8,0.12); color: #f7d04a; }
    .blessure-avatar.fit { background: rgba(26,192,87,0.12); color: #6fe09a; }
    .blessure-hd-info { flex: 1; }
    .blessure-joueur { font-size: 15px; font-weight: 700; cursor: pointer; transition: color 0.15s; }
    .blessure-joueur:hover { color: var(--yellow); }
    .blessure-poste { font-size: 12px; color: var(--fg-mute); margin-top: 2px; }
    .statut-badge { font-family: var(--display); font-size: 10px; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase; padding: 4px 10px; border-radius: 6px; flex-shrink: 0; }
    .statut-out { background: rgba(239,67,67,0.15); color: #ff8a8a; }
    .statut-incertain { background: rgba(231,176,8,0.15); color: #f7d04a; }
    .statut-fit { background: rgba(26,192,87,0.15); color: #6fe09a; }

    .blessure-body { padding: 12px 16px; }
    .blessure-type { font-family: var(--display); font-size: 17px; font-weight: 900; letter-spacing: -0.01em; margin-bottom: 6px; }
    .blessure-dates { font-size: 12px; color: var(--fg-mute); display: flex; align-items: center; gap: 6px; }
    .blessure-dates i { font-size: 14px; color: var(--yellow); }
    .blessure-notes { font-size: 12px; color: var(--fg-mute); margin-top: 8px; font-style: italic; border-top: 1px solid var(--border); padding-top: 8px; }

    .blessure-actions { padding: 12px 16px 14px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
    .resolve-btn { flex: 1; background: rgba(26,192,87,0.12); color: #6fe09a; border: 1px solid rgba(26,192,87,0.2); border-radius: 10px; padding: 10px; font-family: var(--display); font-size: 12px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.15s; }
    .resolve-btn:hover { background: rgba(26,192,87,0.2); }
    .delete-btn { background: rgba(239,67,67,0.1); color: #ff8a8a; border: 1px solid rgba(239,67,67,0.2); border-radius: 10px; padding: 10px 14px; font-size: 16px; cursor: pointer; transition: all 0.15s; }
    .delete-btn:hover { background: rgba(239,67,67,0.2); }

    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; display: none; align-items: flex-end; justify-content: center; backdrop-filter: blur(4px); }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border-radius: 24px 24px 0 0; padding: 24px 20px 40px; width: 100%; max-width: 390px; max-height: 92vh; overflow-y: auto; border-top: 1px solid var(--border-strong); }
    .modal-handle { width: 40px; height: 4px; border-radius: 2px; background: var(--border-strong); margin: 0 auto 20px; }
    .modal-title { font-family: var(--display); font-size: 20px; font-weight: 900; letter-spacing: -0.02em; margin-bottom: 20px; }
    .field-label { font-family: var(--display); font-size: 10px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; color: var(--fg-mute); margin-bottom: 8px; }
    .field-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 13px 16px; color: var(--fg); font-size: 15px; font-family: var(--sans); margin-bottom: 16px; outline: none; transition: border-color 0.2s; }
    .field-input:focus { border-color: var(--yellow); }
    select.field-input { appearance: none; }
    .modal-actions { display: flex; gap: 10px; margin-top: 8px; }
    .btn-cancel { flex: 1; background: var(--bg2); color: var(--fg-mute); border: 1px solid var(--border); border-radius: 12px; padding: 14px; font-family: var(--display); font-size: 14px; font-weight: 700; cursor: pointer; }
    .btn-save { flex: 2; background: var(--yellow); color: var(--bg); border: none; border-radius: 12px; padding: 14px; font-family: var(--display); font-size: 15px; font-weight: 800; cursor: pointer; }

    .empty { color: var(--fg-faint); font-size: 13px; text-align: center; padding: 40px; }

    .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 390px; background: var(--surface); border-top: 1px solid var(--border); display: flex; align-items: center; padding: 10px 0 24px; z-index: 100; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; text-decoration: none; cursor: pointer; background: none; border: none; }
    .nav-item span { font-family: var(--display); font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-faint); }
    .nav-item.active span { color: var(--yellow); }
    .nav-item i { font-size: 22px; color: var(--fg-faint); }
    .nav-item.active i { color: var(--yellow); }
    .nav-center { flex: 1; display: flex; justify-content: center; }
    .nav-fab { width: 52px; height: 52px; background: var(--yellow); color: var(--bg); border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 26px; margin-top: -20px; box-shadow: 0 6px 16px rgba(255,216,58,0.4); }
  </style>
</head>
<body>

  <div class="appbar">
    <a href="dashboard.html" class="back-btn"><i class="ri-arrow-left-s-line"></i></a>
    <h1>Infirmerie</h1>
    <button class="add-btn" onclick="openModal()"><i class="ri-add-line"></i> Blessure</button>
  </div>

  <div class="statblock">
    <div class="statblock-cell">
      <div class="statblock-lbl">Forfaits</div>
      <div class="statblock-num red" id="nbOut">0</div>
    </div>
    <div class="statblock-cell">
      <div class="statblock-lbl">Incertains</div>
      <div class="statblock-num yellow" id="nbIncertain">0</div>
    </div>
    <div class="statblock-cell">
      <div class="statblock-lbl">Rétablis</div>
      <div class="statblock-num green" id="nbFit">0</div>
    </div>
  </div>

  <div class="segments">
    <button class="segment active" onclick="switchTab('encours', this)">En cours</button>
    <button class="segment" onclick="switchTab('historique', this)">Historique</button>
  </div>

  <div class="list" id="blessuresList">
    <p class="empty">Chargement...</p>
  </div>

  <!-- MODAL AJOUT BLESSURE -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">Nouvelle blessure</div>

      <div class="field-label">Joueur *</div>
      <select class="field-input" id="bJoueur">
        <option value="">Choisir un joueur</option>
      </select>

      <div class="field-label">Type de blessure *</div>
      <input class="field-input" id="bType" placeholder="Ex: Entorse cheville">

      <div class="field-label">Date début *</div>
      <input class="field-input" id="bDebut" type="date">

      <div class="field-label">Retour estimé</div>
      <input class="field-input" id="bRetour" type="date">

      <div class="field-label">Statut</div>
      <select class="field-input" id="bStatut">
        <option value="out">Forfait (Out)</option>
        <option value="incertain">Incertain</option>
        <option value="fit">Fit</option>
      </select>

      <div class="field-label">Notes médicales</div>
      <textarea class="field-input" id="bNotes" rows="2" placeholder="Observations..."></textarea>

      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Annuler</button>
        <button class="btn-save" onclick="saveBlessure()">Enregistrer</button>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item"><i class="ri-home-5-line"></i><span>Accueil</span></a>
    <a href="effectif.html" class="nav-item"><i class="ri-group-line"></i><span>Effectif</span></a>
    <div class="nav-center">
      <button class="nav-fab" onclick="openModal()"><i class="ri-add-line"></i></button>
    </div>
    <a href="seances.html" class="nav-item"><i class="ri-calendar-line"></i><span>Séances</span></a>
    <a href="sante.html" class="nav-item active"><i class="ri-heart-pulse-fill"></i><span>Santé</span></a>
  </nav>

  <script>
    let currentTab = 'encours';
    let allJoueurs = [];

    (async () => {
      await requireAuth();
      const { data } = await window.supabaseClient.from('joueurs').select('*').eq('archive', false).order('nom');
      allJoueurs = data || [];
      const select = document.getElementById('bJoueur');
      allJoueurs.forEach(j => {
        const opt = document.createElement('option');
        opt.value = j.id;
        opt.textContent = `${j.prenom} ${j.nom} — ${j.poste || ''}`;
        select.appendChild(opt);
      });
      await loadBlessures();
    })();

    async function loadBlessures() {
      const encours = currentTab === 'encours';
      const { data } = await window.supabaseClient
        .from('sante').select('*, joueurs(id, nom, prenom, poste)')
        .eq('resolved', !encours)
        .order('created_at', { ascending: false });

      const { data: all } = await window.supabaseClient.from('sante').select('*').eq('resolved', false);
      if (all) {
        document.getElementById('nbOut').textContent = all.filter(b => b.statut === 'out').length;
        document.getElementById('nbIncertain').textContent = all.filter(b => b.statut === 'incertain').length;
        document.getElementById('nbFit').textContent = all.filter(b => b.statut === 'fit').length;
      }

      const list = document.getElementById('blessuresList');
      if (!data || !data.length) {
        list.innerHTML = `<p class="empty">${encours ? 'Aucune blessure en cours 💪' : 'Aucun historique'}</p>`;
        return;
      }

      list.innerHTML = data.map(b => {
        const debut = new Date(b.date_debut).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', year: 'numeric' });
        const retour = b.date_retour_estime ? new Date(b.date_retour_estime).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' }) : 'Non défini';
        const initiales = `${b.joueurs?.prenom?.charAt(0) || '?'}${b.joueurs?.nom?.charAt(0) || '?'}`;
        return `<div class="blessure-card">
          <div class="blessure-hd">
            <div class="blessure-avatar ${b.statut}">${initiales}</div>
            <div class="blessure-hd-info">
              <div class="blessure-joueur" onclick="window.location.href='joueur.html?id=${b.joueurs?.id}'">${b.joueurs?.prenom} ${b.joueurs?.nom}</div>
              <div class="blessure-poste">${b.joueurs?.poste || '—'}</div>
            </div>
            <span class="statut-badge statut-${b.statut}">${b.statut.toUpperCase()}</span>
          </div>
          <div class="blessure-body">
            <div class="blessure-type">${b.type_blessure}</div>
            <div class="blessure-dates">
              <i class="ri-calendar-line"></i>
              Depuis le ${debut}
              <span style="width:3px;height:3px;border-radius:50%;background:currentColor;opacity:0.4;display:inline-block"></span>
              Retour : ${retour}
            </div>
            ${b.notes_medicales ? `<div class="blessure-notes">${b.notes_medicales}</div>` : ''}
          </div>
          ${encours ? `<div class="blessure-actions">
            <button class="resolve-btn" onclick="resoudre(${b.id})"><i class="ri-checkbox-circle-line"></i> Marquer rétabli</button>
            <button class="delete-btn" onclick="supprimer(${b.id})"><i class="ri-delete-bin-line"></i></button>
          </div>` : ''}
        </div>`;
      }).join('');
    }

    function switchTab(tab, el) {
      currentTab = tab;
      document.querySelectorAll('.segment').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      loadBlessures();
    }

    function openModal() { document.getElementById('modalOverlay').classList.add('open'); }
    function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

    async function saveBlessure() {
      const joueur_id = document.getElementById('bJoueur').value;
      const type_blessure = document.getElementById('bType').value.trim();
      const date_debut = document.getElementById('bDebut').value;
      if (!joueur_id || !type_blessure || !date_debut) { alert('Joueur, type et date obligatoires'); return; }
      await window.supabaseClient.from('sante').insert({
        joueur_id: parseInt(joueur_id), type_blessure, date_debut,
        date_retour_estime: document.getElementById('bRetour').value || null,
        statut: document.getElementById('bStatut').value,
        notes_medicales: document.getElementById('bNotes').value.trim() || null,
        resolved: false
      });
      closeModal();
      await loadBlessures();
    }

    async function resoudre(id) {
      await window.supabaseClient.from('sante').update({ resolved: true, statut: 'fit' }).eq('id', id);
      await loadBlessures();
    }

    async function supprimer(id) {
      if (!confirm('Supprimer cette blessure ?')) return;
      await window.supabaseClient.from('sante').delete().eq('id', id);
      await loadBlessures();
    }
  </script>
</body>
</html>
