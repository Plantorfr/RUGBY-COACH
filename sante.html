<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Santé — RugbyCoach</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/auth.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #111; color: #fff; max-width: 390px; margin: 0 auto; padding-bottom: 80px; }
    .header { padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
    .back-btn { width: 36px; height: 36px; background: #1e1e1e; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; text-decoration: none; }
    .header h1 { font-size: 18px; font-weight: 700; }
    .add-btn { margin-left: auto; background: #F59E0B; color: #111; border: none; border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer; }

    .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 0 20px 20px; }
    .stat-card { background: #1e1e1e; border-radius: 12px; padding: 14px 12px; }
    .stat-val { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
    .stat-lbl { font-size: 11px; color: #666; }

    .tabs { display: flex; border-bottom: 0.5px solid #2a2a2a; padding: 0 20px; margin-bottom: 16px; }
    .tab { flex: 1; padding: 12px 0; text-align: center; font-size: 13px; font-weight: 500; color: #666; cursor: pointer; border-bottom: 2px solid transparent; }
    .tab.active { color: #F59E0B; border-bottom-color: #F59E0B; }

    .section { padding: 0 20px; margin-bottom: 24px; }
    .blessure-card { background: #1e1e1e; border-radius: 12px; padding: 16px; margin-bottom: 10px; }
    .blessure-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .blessure-joueur { font-size: 15px; font-weight: 700; cursor: pointer; }
    .blessure-joueur:hover { color: #F59E0B; }
    .blessure-statut { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
    .statut-out { background: #3a1a1a; color: #C0392B; }
    .statut-incertain { background: #3a2e1a; color: #e67e22; }
    .statut-fit { background: #1a3a1a; color: #27ae60; }
    .blessure-type { font-size: 13px; color: #F59E0B; font-weight: 600; margin-bottom: 4px; }
    .blessure-dates { font-size: 12px; color: #666; margin-bottom: 6px; }
    .blessure-notes { font-size: 12px; color: #888; font-style: italic; border-top: 0.5px solid #2a2a2a; padding-top: 8px; margin-top: 6px; }
    .card-actions { display: flex; gap: 8px; margin-top: 10px; }
    .resolve-btn { flex: 1; background: #1a3a1a; color: #27ae60; border: none; border-radius: 8px; padding: 8px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .delete-btn { background: #3a1a1a; color: #C0392B; border: none; border-radius: 8px; padding: 8px 12px; font-size: 12px; cursor: pointer; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #1a1a1a; border-radius: 20px 20px 0 0; padding: 24px 20px; width: 100%; max-width: 390px; max-height: 90vh; overflow-y: auto; }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
    .field-label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; font-weight: 600; }
    .field-input { width: 100%; background: #111; border: 0.5px solid #2a2a2a; border-radius: 10px; padding: 12px 14px; color: #fff; font-size: 14px; margin-bottom: 16px; outline: none; font-family: inherit; }
    .field-input:focus { border-color: #F59E0B; }
    select.field-input { appearance: none; }
    .modal-actions { display: flex; gap: 10px; margin-top: 8px; }
    .btn-cancel { flex: 1; background: #2a2a2a; color: #fff; border: none; border-radius: 10px; padding: 14px; font-size: 15px; cursor: pointer; }
    .btn-save { flex: 2; background: #F59E0B; color: #111; border: none; border-radius: 10px; padding: 14px; font-size: 15px; font-weight: 600; cursor: pointer; }

    .empty { color: #444; font-size: 13px; text-align: center; padding: 40px; }

    .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 390px; background: #1a1a1a; border-top: 0.5px solid #2a2a2a; display: flex; align-items: center; padding: 8px 0; z-index: 100; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; text-decoration: none; cursor: pointer; background: none; border: none; }
    .nav-item span { font-size: 10px; color: #666; }
    .nav-item.active span { color: #F59E0B; }
    .nav-item svg { opacity: 0.4; }
    .nav-item.active svg { opacity: 1; }
    .nav-center { flex: 1; display: flex; justify-content: center; }
    .nav-plus { width: 48px; height: 48px; background: #F59E0B; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; margin-top: -20px; box-shadow: 0 4px 12px rgba(245,158,11,0.4); }
  </style>
</head>
<body>

  <div class="header">
    <a href="dashboard.html" class="back-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <h1>Infirmerie</h1>
    <button class="add-btn" onclick="openModal()">+ Blessure</button>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-val" style="color:#C0392B" id="nbOut">0</div>
      <div class="stat-lbl">Forfaits</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" style="color:#e67e22" id="nbIncertain">0</div>
      <div class="stat-lbl">Incertains</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" style="color:#27ae60" id="nbFit">0</div>
      <div class="stat-lbl">Rétablis</div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('encours', this)">En cours</div>
    <div class="tab" onclick="switchTab('historique', this)">Historique</div>
  </div>

  <div class="section">
    <div id="blessuresList"><p class="empty">Chargement...</p></div>
  </div>

  <!-- MODAL AJOUT BLESSURE -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-title">Nouvelle blessure</div>

      <div class="field-label">Joueur *</div>
      <select class="field-input" id="bJoueur">
        <option value="">Choisir un joueur</option>
      </select>

      <div class="field-label">Type de blessure *</div>
      <input class="field-input" id="bType" placeholder="Ex: Entorse cheville">

      <div class="field-label">Date début *</div>
      <input class="field-input" id="bDebut" type="date">

      <div class="field-label">Retour estimé</div>
      <input class="field-input" id="bRetour" type="date">

      <div class="field-label">Statut</div>
      <select class="field-input" id="bStatut">
        <option value="out">Forfait (Out)</option>
        <option value="incertain">Incertain</option>
        <option value="fit">Fit</option>
      </select>

      <div class="field-label">Notes médicales</div>
      <textarea class="field-input" id="bNotes" rows="2" placeholder="Observations..."></textarea>

      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Annuler</button>
        <button class="btn-save" onclick="saveBlessure()">Enregistrer</button>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      <span>Accueil</span>
    </a>
    <a href="effectif.html" class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
      <span>Effectif</span>
    </a>
    <div class="nav-center">
      <button class="nav-plus" onclick="openModal()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
    <a href="seances.html" class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>Séances</span>
    </a>
    <a href="sante.html" class="nav-item active">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#F59E0B" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
      <span>Santé</span>
    </a>
  </nav>

  <script>
    let currentTab = 'encours';
    let allJoueurs = [];

    (async () => {
      await requireAuth();
      const { data } = await window.supabaseClient.from('joueurs').select('*').eq('archive', false).order('nom');
      allJoueurs = data || [];
      const select = document.getElementById('bJoueur');
      allJoueurs.forEach(j => {
        const opt = document.createElement('option');
        opt.value = j.id;
        opt.textContent = `${j.prenom} ${j.nom} — ${j.poste || ''}`;
        select.appendChild(opt);
      });
      await loadBlessures();
    })();

    async function loadBlessures() {
      const encours = currentTab === 'encours';
      const { data } = await window.supabaseClient
        .from('sante')
        .select('*, joueurs(id, nom, prenom, poste)')
        .eq('resolved', !encours)
        .order('created_at', { ascending: false });

      const all = await window.supabaseClient.from('sante').select('*').eq('resolved', false);
      if (all.data) {
        document.getElementById('nbOut').textContent = all.data.filter(b => b.statut === 'out').length;
        document.getElementById('nbIncertain').textContent = all.data.filter(b => b.statut === 'incertain').length;
        document.getElementById('nbFit').textContent = all.data.filter(b => b.statut === 'fit').length;
      }

      const list = document.getElementById('blessuresList');
      if (!data || !data.length) {
        list.innerHTML = `<p class="empty">${encours ? 'Aucune blessure en cours 💪' : 'Aucun historique'}</p>`;
        return;
      }

      list.innerHTML = data.map(b => {
        const debut = new Date(b.date_debut).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', year: 'numeric' });
        const retour = b.date_retour_estime ? new Date(b.date_retour_estime).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' }) : '?';
        return `<div class="blessure-card">
          <div class="blessure-top">
            <div class="blessure-joueur" onclick="window.location.href='joueur.html?id=${b.joueurs?.id}'">${b.joueurs?.prenom} ${b.joueurs?.nom}</div>
            <span class="blessure-statut statut-${b.statut}">${b.statut.toUpperCase()}</span>
          </div>
          <div class="blessure-type">${b.type_blessure}</div>
          <div class="blessure-dates">📅 Depuis le ${debut} · Retour estimé : ${retour}</div>
          ${b.notes_medicales ? `<div class="blessure-notes">${b.notes_medicales}</div>` : ''}
          ${encours ? `<div class="card-actions">
            <button class="resolve-btn" onclick="resoudre(${b.id})">✅ Marquer rétabli</button>
            <button class="delete-btn" onclick="supprimer(${b.id})">🗑</button>
          </div>` : ''}
        </div>`;
      }).join('');
    }

    function switchTab(tab, el) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      loadBlessures();
    }

    function openModal() { document.getElementById('modalOverlay').classList.add('open'); }
    function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

    async function saveBlessure() {
      const joueur_id = document.getElementById('bJoueur').value;
      const type_blessure = document.getElementById('bType').value.trim();
      const date_debut = document.getElementById('bDebut').value;
      if (!joueur_id || !type_blessure || !date_debut) { alert('Joueur, type et date obligatoires'); return; }

      await window.supabaseClient.from('sante').insert({
        joueur_id: parseInt(joueur_id),
        type_blessure,
        date_debut,
        date_retour_estime: document.getElementById('bRetour').value || null,
        statut: document.getElementById('bStatut').value,
        notes_medicales: document.getElementById('bNotes').value.trim() || null,
        resolved: false
      });
      closeModal();
      await loadBlessures();
    }

    async function resoudre(id) {
      await window.supabaseClient.from('sante').update({ resolved: true, statut: 'fit' }).eq('id', id);
      await loadBlessures();
    }

    async function supprimer(id) {
      if (!confirm('Supprimer cette blessure ?')) return;
      await window.supabaseClient.from('sante').delete().eq('id', id);
      await loadBlessures();
    }
  </script>
</body>
</html>
