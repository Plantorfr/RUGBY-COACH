<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Santé — RugbyCoach</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/auth.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #111; color: #fff; max-width: 390px; margin: 0 auto; padding-bottom: 80px; }
    .header { padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
    .back-btn { width: 36px; height: 36px; background: #1e1e1e; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; text-decoration: none; }
    .header h1 { font-size: 18px; font-weight: 700; }
    .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 0 20px 20px; }
    .stat-card { background: #1e1e1e; border-radius: 12px; padding: 14px 12px; }
    .stat-val { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
    .stat-lbl { font-size: 11px; color: #666; }
    .section { padding: 0 20px; margin-bottom: 24px; }
    .section-title { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 12px; }
    .blessure-card { background: #1e1e1e; border-radius: 12px; padding: 16px; margin-bottom: 10px; }
    .blessure-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .blessure-joueur { font-size: 15px; font-weight: 700; }
    .blessure-statut { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
    .statut-out { background: #3a1a1a; color: #C0392B; }
    .statut-incertain { background: #3a2e1a; color: #e67e22; }
    .statut-fit { background: #1a3a1a; color: #27ae60; }
    .blessure-type { font-size: 13px; color: #F59E0B; font-weight: 600; margin-bottom: 4px; }
    .blessure-dates { font-size: 12px; color: #666; }
    .blessure-notes { font-size: 12px; color: #888; margin-top: 6px; font-style: italic; }
    .resolve-btn { width: 100%; background: #2a2a2a; color: #888; border: none; border-radius: 8px; padding: 8px; font-size: 12px; cursor: pointer; margin-top: 10px; }
    .resolve-btn:hover { background: #1a3a1a; color: #27ae60; }
    .empty { color: #444; font-size: 13px; text-align: center; padding: 40px; }
    .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 390px; background: #1a1a1a; border-top: 0.5px solid #2a2a2a; display: flex; align-items: center; padding: 8px 0; z-index: 100; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; text-decoration: none; cursor: pointer; background: none; border: none; }
    .nav-item span { font-size: 10px; color: #666; }
    .nav-item.active span { color: #F59E0B; }
    .nav-item svg { opacity: 0.4; }
    .nav-item.active svg { opacity: 1; }
    .nav-center { flex: 1; display: flex; justify-content: center; }
    .nav-plus { width: 48px; height: 48px; background: #F59E0B; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; margin-top: -20px; box-shadow: 0 4px 12px rgba(245,158,11,0.4); }
  </style>
</head>
<body>
  <div class="header">
    <a href="dashboard.html" class="back-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <h1>Infirmerie</h1>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-val" style="color:#C0392B" id="nbOut">0</div>
      <div class="stat-lbl">Forfaits</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" style="color:#e67e22" id="nbIncertain">0</div>
      <div class="stat-lbl">Incertains</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" style="color:#27ae60" id="nbFit">0</div>
      <div class="stat-lbl">Rétablis</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Blessures en cours</div>
    <div id="blessuresList"><p class="empty">Chargement...</p></div>
  </div>

  <nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      <span>Accueil</span>
    </a>
    <a href="effectif.html" class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
      <span>Effectif</span>
    </a>
    <div class="nav-center">
      <button class="nav-plus" onclick="window.location.href='matchs.html'">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
    <a href="seances.html" class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>Séances</span>
    </a>
    <button class="nav-item active" onclick="window.location.href='sante.html'">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#F59E0B" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
      <span>Santé</span>
    </button>
  </nav>

  <script>
    (async () => {
      await requireAuth();
      const { data } = await window.supabaseClient
        .from('sante')
        .select('*, joueurs(nom, prenom, poste)')
        .eq('resolved', false)
        .order('created_at', { ascending: false });

      if (data) {
        document.getElementById('nbOut').textContent = data.filter(b => b.statut === 'out').length;
        document.getElementById('nbIncertain').textContent = data.filter(b => b.statut === 'incertain').length;
        document.getElementById('nbFit').textContent = data.filter(b => b.statut === 'fit').length;
      }

      const list = document.getElementById('blessuresList');
      if (!data || !data.length) {
        list.innerHTML = '<p class="empty">Aucune blessure en cours 💪</p>';
        return;
      }

      list.innerHTML = data.map(b => {
        const debut = new Date(b.date_debut).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', year: 'numeric' });
        const retour = b.date_retour_estime ? new Date(b.date_retour_estime).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' }) : '?';
        return `<div class="blessure-card">
          <div class="blessure-top">
            <div class="blessure-joueur">${b.joueurs?.prenom} ${b.joueurs?.nom}</div>
            <span class="blessure-statut statut-${b.statut}">${b.statut.toUpperCase()}</span>
          </div>
          <div class="blessure-type">${b.type_blessure}</div>
          <div class="blessure-dates">📅 Depuis le ${debut} · Retour estimé : ${retour}</div>
          ${b.notes_medicales ? `<div class="blessure-notes">${b.notes_medicales}</div>` : ''}
          <button class="resolve-btn" onclick="resoudre(${b.id})">✅ Marquer comme rétabli</button>
        </div>`;
      }).join('');
    })();

    async function resoudre(id) {
      await window.supabaseClient.from('sante').update({ resolved: true, statut: 'fit' }).eq('id', id);
      window.location.reload();
    }
  </script>
</body>
</html>
