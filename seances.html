<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Séances — RugbyCoach</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0e15">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Roboto+Condensed:ital,wght@0,700;0,800;0,900;1,700;1,800;1,900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/auth.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0e15; --bg2: #131a26; --surface: #161e2c; --surface2: #1c2535;
      --border: #243049; --border-strong: #2f3d5a;
      --fg: #f4ecdb; --fg-mute: #9aa5b8; --fg-faint: #6b7689;
      --yellow: #ffd83a; --red: #ef4343;
      --display: "Roboto Condensed", system-ui, sans-serif;
      --sans: "Roboto", system-ui, sans-serif;
    }
    body { font-family: var(--sans); background: var(--bg); color: var(--fg); max-width: 390px; margin: 0 auto; padding-bottom: 90px; -webkit-font-smoothing: antialiased; }

    .appbar { display: flex; align-items: center; gap: 12px; padding: 14px 18px 16px; }
    .back-btn { width: 40px; height: 40px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); color: var(--fg); display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 20px; }
    .appbar h1 { font-family: var(--display); font-size: 22px; font-weight: 900; letter-spacing: -0.02em; }
    .add-btn { margin-left: auto; background: var(--yellow); color: var(--bg); border: none; border-radius: 10px; padding: 9px 16px; font-family: var(--display); font-size: 13px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 6px; }

    /* STATS ROW */
    .statblock { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 0 18px 20px; }
    .statblock-cell { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 14px; display: flex; flex-direction: column; gap: 6px; }
    .statblock-lbl { font-family: var(--display); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--fg-mute); }
    .statblock-num { font-family: var(--display); font-size: 32px; font-weight: 900; letter-spacing: -0.04em; line-height: 1; color: var(--yellow); }

    .list { padding: 0 18px; display: flex; flex-direction: column; gap: 10px; }

    /* SEANCE CARD */
    .seance-card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; overflow: hidden; }
    .seance-hd { padding: 14px 16px 12px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; }
    .seance-type-badge { font-family: var(--display); font-size: 10px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; padding: 4px 8px; border-radius: 6px; }
    .type-physique { background: rgba(26,192,87,0.15); color: #6fe09a; }
    .type-technique { background: rgba(30,59,138,0.2); color: #7b9bf0; }
    .type-tactique { background: rgba(231,176,8,0.15); color: #f7d04a; }
    .type-match { background: rgba(239,67,67,0.15); color: #ff8a8a; }
    .type-recuperation { background: rgba(155,89,182,0.15); color: #c39bd3; }
    .seance-date { font-size: 12px; color: var(--fg-mute); }
    .seance-body { padding: 12px 16px; }
    .seance-title { font-family: var(--display); font-size: 17px; font-weight: 900; letter-spacing: -0.01em; margin-bottom: 6px; }
    .seance-meta { display: flex; gap: 12px; flex-wrap: wrap; }
    .seance-meta-item { font-size: 12px; color: var(--fg-mute); display: flex; align-items: center; gap: 4px; }
    .seance-meta-item i { font-size: 14px; color: var(--yellow); }
    .seance-notes { font-size: 12px; color: var(--fg-mute); margin-top: 10px; font-style: italic; border-top: 1px solid var(--border); padding-top: 10px; line-height: 1.4; }
    .presence-section { padding: 10px 16px 14px; border-top: 1px solid var(--border); }
    .presence-title { font-family: var(--display); font-size: 10px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-mute); margin-bottom: 8px; }
    .presence-pills { display: flex; flex-wrap: wrap; gap: 6px; }
    .presence-pill { font-family: var(--display); font-size: 10px; font-weight: 700; background: rgba(255,216,58,0.1); color: var(--yellow); border: 1px solid rgba(255,216,58,0.2); padding: 3px 8px; border-radius: 6px; }

    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; display: none; align-items: flex-end; justify-content: center; backdrop-filter: blur(4px); }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border-radius: 24px 24px 0 0; padding: 24px 20px 40px; width: 100%; max-width: 390px; max-height: 92vh; overflow-y: auto; border-top: 1px solid var(--border-strong); }
    .modal-handle { width: 40px; height: 4px; border-radius: 2px; background: var(--border-strong); margin: 0 auto 20px; }
    .modal-title { font-family: var(--display); font-size: 20px; font-weight: 900; letter-spacing: -0.02em; margin-bottom: 20px; }
    .field-label { font-family: var(--display); font-size: 10px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; color: var(--fg-mute); margin-bottom: 8px; }
    .field-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 13px 16px; color: var(--fg); font-size: 15px; font-family: var(--sans); margin-bottom: 16px; outline: none; transition: border-color 0.2s; }
    .field-input:focus { border-color: var(--yellow); }
    select.field-input { appearance: none; }

    .presence-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
    .presence-check { display: flex; align-items: center; gap: 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; cursor: pointer; transition: all 0.15s; }
    .presence-check.checked { border-color: var(--yellow); background: rgba(255,216,58,0.06); }
    .presence-check input { accent-color: var(--yellow); width: 16px; height: 16px; flex-shrink: 0; }
    .presence-check-name { font-size: 13px; font-weight: 500; }

    .modal-actions { display: flex; gap: 10px; margin-top: 8px; }
    .btn-cancel { flex: 1; background: var(--bg2); color: var(--fg-mute); border: 1px solid var(--border); border-radius: 12px; padding: 14px; font-family: var(--display); font-size: 14px; font-weight: 700; cursor: pointer; }
    .btn-save { flex: 2; background: var(--yellow); color: var(--bg); border: none; border-radius: 12px; padding: 14px; font-family: var(--display); font-size: 15px; font-weight: 800; cursor: pointer; }

    .empty { color: var(--fg-faint); font-size: 13px; text-align: center; padding: 40px; }

    .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 390px; background: var(--surface); border-top: 1px solid var(--border); display: flex; align-items: center; padding: 10px 0 24px; z-index: 100; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; text-decoration: none; cursor: pointer; background: none; border: none; }
    .nav-item span { font-family: var(--display); font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-faint); }
    .nav-item.active span { color: var(--yellow); }
    .nav-item i { font-size: 22px; color: var(--fg-faint); }
    .nav-item.active i { color: var(--yellow); }
    .nav-center { flex: 1; display: flex; justify-content: center; }
    .nav-fab { width: 52px; height: 52px; background: var(--yellow); color: var(--bg); border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 26px; margin-top: -20px; box-shadow: 0 6px 16px rgba(255,216,58,0.4); }
  </style>
</head>
<body>

  <div class="appbar">
    <a href="dashboard.html" class="back-btn"><i class="ri-arrow-left-s-line"></i></a>
    <h1>Séances</h1>
    <button class="add-btn" onclick="openModal()"><i class="ri-add-line"></i> Séance</button>
  </div>

  <div class="statblock">
    <div class="statblock-cell">
      <div class="statblock-lbl">Séances</div>
      <div class="statblock-num" id="nbSeances">0</div>
    </div>
    <div class="statblock-cell">
      <div class="statblock-lbl">Heures</div>
      <div class="statblock-num" id="nbHeures">0h</div>
    </div>
    <div class="statblock-cell">
      <div class="statblock-lbl">Ce mois</div>
      <div class="statblock-num" id="nbMois">0</div>
    </div>
  </div>

  <div class="list" id="seancesList">
    <p class="empty">Chargement...</p>
  </div>

  <!-- MODAL NOUVELLE SÉANCE -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">Nouvelle séance</div>

      <div class="field-label">Titre *</div>
      <input class="field-input" id="sTitle" placeholder="Ex: Travail défensif">

      <div class="field-label">Type *</div>
      <select class="field-input" id="sType">
        <option value="physique">Physique</option>
        <option value="technique">Technique</option>
        <option value="tactique">Tactique</option>
        <option value="match">Match amical</option>
        <option value="recuperation">Récupération</option>
      </select>

      <div class="field-label">Date *</div>
      <input class="field-input" id="sDate" type="date">

      <div class="field-label">Durée (minutes)</div>
      <input class="field-input" id="sDuree" type="number" placeholder="90">

      <div class="field-label">Objectifs</div>
      <input class="field-input" id="sObjectifs" placeholder="Ex: Améliorer le plaquage bas">

      <div class="field-label">Notes</div>
      <textarea class="field-input" id="sNotes" rows="2" placeholder="Observations générales..."></textarea>

      <div class="field-label">Joueurs présents</div>
      <div class="presence-grid" id="presenceGrid"></div>

      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Annuler</button>
        <button class="btn-save" onclick="saveSeance()">Enregistrer</button>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item"><i class="ri-home-5-line"></i><span>Accueil</span></a>
    <a href="effectif.html" class="nav-item"><i class="ri-group-line"></i><span>Effectif</span></a>
    <div class="nav-center">
      <button class="nav-fab" onclick="openModal()"><i class="ri-add-line"></i></button>
    </div>
    <a href="seances.html" class="nav-item active"><i class="ri-calendar-fill"></i><span>Séances</span></a>
    <a href="sante.html" class="nav-item"><i class="ri-heart-pulse-line"></i><span>Santé</span></a>
  </nav>

  <script>
    let allJoueurs = [];

    (async () => {
      await requireAuth();
      const { data } = await window.supabaseClient.from('joueurs').select('*').eq('archive', false).order('numero');
      allJoueurs = data || [];
      await loadSeances();
    })();

    async function loadSeances() {
      const { data } = await window.supabaseClient.from('seances').select('*').order('date', { ascending: false });

      if (data && data.length) {
        document.getElementById('nbSeances').textContent = data.length;
        const totalMin = data.reduce((s, x) => s + (x.duree || 0), 0);
        document.getElementById('nbHeures').textContent = Math.round(totalMin / 60) + 'h';
        const now = new Date();
        const mois = data.filter(s => {
          const d = new Date(s.date);
          return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
        }).length;
        document.getElementById('nbMois').textContent = mois;
      }

      const list = document.getElementById('seancesList');
      if (!data || !data.length) {
        list.innerHTML = '<p class="empty">Aucune séance — crée la première ! 📋</p>';
        return;
      }

      list.innerHTML = data.map(s => {
        const date = new Date(s.date).toLocaleDateString('fr-FR', { weekday: 'short', day: 'numeric', month: 'long' });
        const presences = s.presences ? JSON.parse(s.presences) : [];
        const joueursPresents = allJoueurs.filter(j => presences.includes(j.id));
        return `<div class="seance-card">
          <div class="seance-hd">
            <span class="seance-type-badge type-${s.type}">${s.type?.toUpperCase()}</span>
            <span class="seance-date">${date}</span>
          </div>
          <div class="seance-body">
            <div class="seance-title">${s.titre}</div>
            <div class="seance-meta">
              ${s.duree ? `<div class="seance-meta-item"><i class="ri-time-line"></i> ${s.duree} min</div>` : ''}
              ${s.objectifs ? `<div class="seance-meta-item"><i class="ri-focus-3-line"></i> ${s.objectifs}</div>` : ''}
            </div>
            ${s.notes ? `<div class="seance-notes">${s.notes}</div>` : ''}
          </div>
          ${joueursPresents.length > 0 ? `
            <div class="presence-section">
              <div class="presence-title">Présents — ${joueursPresents.length} joueurs</div>
              <div class="presence-pills">
                ${joueursPresents.map(j => `<span class="presence-pill">${j.prenom} ${j.nom}</span>`).join('')}
              </div>
            </div>` : ''}
        </div>`;
      }).join('');
    }

    function openModal() {
      const grid = document.getElementById('presenceGrid');
      grid.innerHTML = allJoueurs.map(j => `
        <div class="presence-check" id="check_${j.id}" onclick="togglePresence(${j.id}, this)">
          <input type="checkbox" id="cb_${j.id}">
          <span class="presence-check-name">${j.prenom} ${j.nom}</span>
        </div>`).join('');
      document.getElementById('modalOverlay').classList.add('open');
    }

    function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

    function togglePresence(id, el) {
      const cb = document.getElementById(`cb_${id}`);
      cb.checked = !cb.checked;
      el.classList.toggle('checked', cb.checked);
    }

    async function saveSeance() {
      const titre = document.getElementById('sTitle').value.trim();
      const date = document.getElementById('sDate').value;
      if (!titre || !date) { alert('Titre et date obligatoires'); return; }
      const presences = allJoueurs.filter(j => document.getElementById(`cb_${j.id}`)?.checked).map(j => j.id);
      const { error } = await window.supabaseClient.from('seances').insert({
        titre, type: document.getElementById('sType').value, date,
        duree: parseInt(document.getElementById('sDuree').value) || null,
        objectifs: document.getElementById('sObjectifs').value.trim() || null,
        notes: document.getElementById('sNotes').value.trim() || null,
        presences: JSON.stringify(presences)
      });
      if (error) { alert('Erreur : ' + error.message); return; }
      closeModal();
      await loadSeances();
    }
  </script>
</body>
</html>
