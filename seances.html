<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Séances — RugbyCoach</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/auth.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #111; color: #fff; max-width: 390px; margin: 0 auto; padding-bottom: 80px; }

    .header { padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
    .back-btn { width: 36px; height: 36px; background: #1e1e1e; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; text-decoration: none; }
    .header h1 { font-size: 18px; font-weight: 700; }
    .add-btn { margin-left: auto; background: #F59E0B; color: #111; border: none; border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer; }

    .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 0 20px 20px; }
    .stat-card { background: #1e1e1e; border-radius: 12px; padding: 14px 12px; }
    .stat-val { font-size: 24px; font-weight: 700; color: #F59E0B; margin-bottom: 4px; }
    .stat-lbl { font-size: 11px; color: #666; }

    .section { padding: 0 20px; }
    .section-title { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 12px; }

    .seance-card { background: #1e1e1e; border-radius: 12px; padding: 16px; margin-bottom: 10px; }
    .seance-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .seance-type { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
    .type-physique { background: #1a3a2a; color: #27ae60; }
    .type-technique { background: #1a2a3a; color: #3498db; }
    .type-tactique { background: #3a2a1a; color: #e67e22; }
    .type-match { background: #3a1a1a; color: #C0392B; }
    .type-recuperation { background: #2a1a3a; color: #9b59b6; }
    .seance-date { font-size: 12px; color: #666; }
    .seance-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
    .seance-meta { display: flex; gap: 12px; }
    .seance-meta-item { font-size: 12px; color: #888; }
    .seance-meta-item span { color: #F59E0B; font-weight: 600; }
    .seance-notes { font-size: 12px; color: #666; margin-top: 8px; font-style: italic; border-top: 0.5px solid #2a2a2a; padding-top: 8px; }

    .presence-section { margin-top: 10px; border-top: 0.5px solid #2a2a2a; padding-top: 10px; }
    .presence-title { font-size: 11px; color: #666; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    .presence-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .presence-pill { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: #1a3a1a; color: #27ae60; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #1a1a1a; border-radius: 20px 20px 0 0; padding: 24px 20px; width: 100%; max-width: 390px; max-height: 92vh; overflow-y: auto; }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
    .field-label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; font-weight: 600; }
    .field-input { width: 100%; background: #111; border: 0.5px solid #2a2a2a; border-radius: 10px; padding: 12px 14px; color: #fff; font-size: 14px; margin-bottom: 16px; outline: none; font-family: inherit; }
    .field-input:focus { border-color: #F59E0B; }
    select.field-input { appearance: none; }

    .presence-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
    .presence-check { display: flex; align-items: center; gap: 8px; background: #111; border: 0.5px solid #2a2a2a; border-radius: 8px; padding: 10px 12px; cursor: pointer; }
    .presence-check.checked { border-color: #F59E0B; background: #F59E0B11; }
    .presence-check input { accent-color: #F59E0B; width: 16px; height: 16px; }
    .presence-check-name { font-size: 13px; }

    .modal-actions { display: flex; gap: 10px; margin-top: 8px; }
    .btn-cancel { flex: 1; background: #2a2a2a; color: #fff; border: none; border-radius: 10px; padding: 14px; font-size: 15px; cursor: pointer; }
    .btn-save { flex: 2; background: #F59E0B; color: #111; border: none; border-radius: 10px; padding: 14px; font-size: 15px; font-weight: 600; cursor: pointer; }

    .empty { color: #444; font-size: 13px; text-align: center; padding: 40px; }

    .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 390px; background: #1a1a1a; border-top: 0.5px solid #2a2a2a; display: flex; align-items: center; padding: 8px 0; z-index: 100; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; text-decoration: none; cursor: pointer; background: none; border: none; }
    .nav-item span { font-size: 10px; color: #666; }
    .nav-item.active span { color: #F59E0B; }
    .nav-item svg { opacity: 0.4; }
    .nav-item.active svg { opacity: 1; }
    .nav-center { flex: 1; display: flex; justify-content: center; }
    .nav-plus { width: 48px; height: 48px; background: #F59E0B; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; margin-top: -20px; box-shadow: 0 4px 12px rgba(245,158,11,0.4); }
  </style>
</head>
<body>

  <div class="header">
    <a href="dashboard.html" class="back-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <h1>Séances</h1>
    <button class="add-btn" onclick="openModal()">+ Séance</button>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-val" id="nbSeances">0</div>
      <div class="stat-lbl">Séances</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="nbHeures">0h</div>
      <div class="stat-lbl">Total heures</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="tauxPresence">—</div>
      <div class="stat-lbl">Présence moy.</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Toutes les séances</div>
    <div id="seancesList"><p class="empty">Chargement...</p></div>
  </div>

  <!-- MODAL NOUVELLE SÉANCE -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-title">Nouvelle séance</div>

      <div class="field-label">Titre *</div>
      <input class="field-input" id="sTitle" placeholder="Ex: Travail défensif">

      <div class="field-label">Type *</div>
      <select class="field-input" id="sType">
        <option value="physique">Physique</option>
        <option value="technique">Technique</option>
        <option value="tactique">Tactique</option>
        <option value="match">Match amical</option>
        <option value="recuperation">Récupération</option>
      </select>

      <div class="field-label">Date *</div>
      <input class="field-input" id="sDate" type="date">

      <div class="field-label">Durée (minutes)</div>
      <input class="field-input" id="sDuree" type="number" placeholder="90" min="0">

      <div class="field-label">Objectifs</div>
      <input class="field-input" id="sObjectifs" placeholder="Ex: Améliorer le plaquage bas">

      <div class="field-label">Notes</div>
      <textarea class="field-input" id="sNotes" rows="2" placeholder="Observations générales..."></textarea>

      <div class="field-label">Joueurs présents</div>
      <div class="presence-grid" id="presenceGrid"></div>

      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Annuler</button>
        <button class="btn-save" onclick="saveSeance()">Enregistrer</button>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      <span>Accueil</span>
    </a>
    <a href="effectif.html" class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
      <span>Effectif</span>
    </a>
    <div class="nav-center">
      <button class="nav-plus" onclick="openModal()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
    <a href="seances.html" class="nav-item active">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#F59E0B" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>Séances</span>
    </a>
    <button class="nav-item" onclick="logout()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      <span>Plus</span>
    </button>
  </nav>

  <script>
    let allJoueurs = [];

    (async () => {
      await requireAuth();
      const { data } = await window.supabaseClient.from('joueurs').select('*').order('numero');
      allJoueurs = data || [];
      await loadSeances();
    })();

    async function loadSeances() {
      const { data } = await window.supabaseClient
        .from('seances').select('*').order('date', { ascending: false });

      if (data && data.length) {
        document.getElementById('nbSeances').textContent = data.length;
        const totalMin = data.reduce((s, x) => s + (x.duree || 0), 0);
        document.getElementById('nbHeures').textContent = Math.round(totalMin / 60) + 'h';
      }

      const list = document.getElementById('seancesList');
      if (!data || !data.length) {
        list.innerHTML = '<p class="empty">Aucune séance — crée la première ! 📋</p>';
        return;
      }

      list.innerHTML = data.map(s => {
        const date = new Date(s.date).toLocaleDateString('fr-FR', { weekday: 'short', day: 'numeric', month: 'long' });
        const presences = s.presences ? JSON.parse(s.presences) : [];
        const joueursPresents = allJoueurs.filter(j => presences.includes(j.id));
        return `<div class="seance-card">
          <div class="seance-top">
            <span class="seance-type type-${s.type}">${s.type?.toUpperCase()}</span>
            <span class="seance-date">${date}</span>
          </div>
          <div class="seance-title">${s.titre}</div>
          <div class="seance-meta">
            ${s.duree ? `<div class="seance-meta-item">⏱ <span>${s.duree} min</span></div>` : ''}
            ${s.objectifs ? `<div class="seance-meta-item">🎯 ${s.objectifs}</div>` : ''}
          </div>
          ${s.notes ? `<div class="seance-notes">${s.notes}</div>` : ''}
          ${joueursPresents.length > 0 ? `
            <div class="presence-section">
              <div class="presence-title">Présents (${joueursPresents.length})</div>
              <div class="presence-list">
                ${joueursPresents.map(j => `<span class="presence-pill">${j.prenom} ${j.nom}</span>`).join('')}
              </div>
            </div>` : ''}
        </div>`;
      }).join('');
    }

    function openModal() {
      const grid = document.getElementById('presenceGrid');
      grid.innerHTML = allJoueurs.map(j => `
        <div class="presence-check" id="check_${j.id}" onclick="togglePresence(${j.id}, this)">
          <input type="checkbox" id="cb_${j.id}">
          <span class="presence-check-name">${j.prenom} ${j.nom}</span>
        </div>`).join('');
      document.getElementById('modalOverlay').classList.add('open');
    }

    function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

    function togglePresence(id, el) {
      const cb = document.getElementById(`cb_${id}`);
      cb.checked = !cb.checked;
      el.classList.toggle('checked', cb.checked);
    }

    async function saveSeance() {
      const titre = document.getElementById('sTitle').value.trim();
      const date = document.getElementById('sDate').value;
      if (!titre || !date) { alert('Titre et date obligatoires'); return; }

      const presences = allJoueurs
        .filter(j => document.getElementById(`cb_${j.id}`)?.checked)
        .map(j => j.id);

      const { error } = await window.supabaseClient.from('seances').insert({
        titre,
        type: document.getElementById('sType').value,
        date,
        duree: parseInt(document.getElementById('sDuree').value) || null,
        objectifs: document.getElementById('sObjectifs').value.trim() || null,
        notes: document.getElementById('sNotes').value.trim() || null,
        presences: JSON.stringify(presences)
      });

      if (error) { alert('Erreur : ' + error.message); return; }
      closeModal();
      await loadSeances();
    }
  </script>
</body>
</html>
