<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>RugbyCoach — RCACP 95</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#111111">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/auth.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      width: 100%;
      max-width: 390px;
      padding: 40px 28px;
    }
    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 48px;
    }
    .logo-badge {
      width: 44px;
      height: 44px;
      background: #F59E0B;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      color: #111;
    }
    .logo-text { line-height: 1.2; }
    .logo-text strong { font-size: 16px; font-weight: 600; display: block; }
    .logo-text span { font-size: 12px; color: #888; }
    h1 {
      font-size: 38px;
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 12px;
    }
    h1 em {
      font-style: normal;
      color: #F59E0B;
    }
    .subtitle {
      color: #888;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 48px;
    }
    .field-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      background: #1e1e1e;
      border: 0.5px solid #2a2a2a;
      border-radius: 10px;
      padding: 14px 16px;
      color: #fff;
      font-size: 15px;
      margin-bottom: 20px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #F59E0B; }
    input::placeholder { color: #444; }
    .btn-login {
      width: 100%;
      background: #F59E0B;
      color: #111;
      border: none;
      border-radius: 10px;
      padding: 16px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
      transition: opacity 0.2s;
    }
    .btn-login:hover { opacity: 0.9; }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
    .forgot {
      text-align: center;
      margin-top: 20px;
      color: #666;
      font-size: 14px;
      cursor: pointer;
    }
    .forgot:hover { color: #fff; }
    .error-msg {
      background: #3a1a1a;
      border: 0.5px solid #C0392B;
      border-radius: 8px;
      color: #ff6b6b;
      font-size: 13px;
      padding: 10px 14px;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-wrap">
      <div class="logo-badge">R</div>
      <div class="logo-text">
        <strong>RugbyCoach</strong>
        <span>RCA CERGY PONTOISE</span>
      </div>
    </div>

    <h1>Le terrain<br>en <em>data.</em></h1>
    <p class="subtitle">Pilotez votre saison, suivez chaque joueur,<br>décidez sur les chiffres.</p>

    <div class="field-label">Email coach</div>
    <input type="email" id="email" placeholder="coach@rca-cergy.fr">

    <div class="field-label">Mot de passe</div>
    <input type="password" id="password" placeholder="••••••••••">

    <div class="error-msg" id="error"></div>

    <button class="btn-login" id="btnLogin">
      Entrer dans le vestiaire →
    </button>
    <p class="forgot">Mot de passe oublié ?</p>
  </div>

  <script>
    document.getElementById('btnLogin').addEventListener('click', async () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('btnLogin');
      const err = document.getElementById('error');

      if (!email || !password) {
        err.textContent = 'Remplis tous les champs.';
        err.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Connexion...';
      err.style.display = 'none';

      try {
        await login(email, password);
        window.location.href = 'dashboard.html';
      } catch (e) {
        err.textContent = 'Email ou mot de passe incorrect.';
        err.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = 'Entrer dans le vestiaire →';
      }
    });

    document.getElementById('password').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') document.getElementById('btnLogin').click();
    });

    (async () => {
      const user = await getUser();
      if (user) window.location.href = 'dashboard.html';
    })();
  </script>
</body>
</html>
