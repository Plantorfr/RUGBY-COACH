<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>RugbyCoach — RCACP 95</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d0d0d">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/auth.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0d0d0d;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: radial-gradient(ellipse at top left, #1a1a1a 0%, #0d0d0d 60%);
    }

    .container {
      width: 100%;
      max-width: 390px;
      padding: 48px 28px;
    }

    /* LOGO */
    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 52px;
    }
    .logo-badge {
      width: 48px;
      height: 48px;
      background: #F59E0B;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 900;
      color: #0d0d0d;
      font-family: 'Inter', sans-serif;
      flex-shrink: 0;
    }
    .logo-text { line-height: 1.25; }
    .logo-text strong {
      font-size: 17px;
      font-weight: 700;
      display: block;
      color: #fff;
      letter-spacing: -0.3px;
    }
    .logo-text span {
      font-size: 11px;
      color: #666;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-weight: 500;
    }

    /* TITRE */
    h1 {
      font-size: 42px;
      font-weight: 900;
      line-height: 1.05;
      margin-bottom: 14px;
      letter-spacing: -1.5px;
      color: #fff;
    }
    h1 em {
      font-style: normal;
      color: #F59E0B;
    }

    .subtitle {
      color: #777;
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 52px;
      font-weight: 400;
    }

    /* FIELDS */
    .field-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      background: #1c1c1c;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 16px 18px;
      color: #fff;
      font-size: 16px;
      font-family: 'Inter', sans-serif;
      margin-bottom: 24px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus {
      border-color: #F59E0B;
      background: #1f1f1f;
    }
    input::placeholder { color: #3a3a3a; }

    /* BOUTON */
    .btn-login {
      width: 100%;
      background: #F59E0B;
      color: #0d0d0d;
      border: none;
      border-radius: 14px;
      padding: 18px;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
      letter-spacing: -0.2px;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-login:hover { opacity: 0.92; }
    .btn-login:active { transform: scale(0.98); }
    .btn-login:disabled { opacity: 0.4; cursor: not-allowed; }

    .forgot {
      text-align: center;
      margin-top: 22px;
      color: #555;
      font-size: 14px;
      cursor: pointer;
      font-weight: 500;
      transition: color 0.2s;
    }
    .forgot:hover { color: #888; }

    .error-msg {
      background: #1f0f0f;
      border: 1px solid #3a1a1a;
      border-radius: 10px;
      color: #ff6b6b;
      font-size: 13px;
      padding: 12px 16px;
      margin-bottom: 16px;
      display: none;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-wrap">
      <div class="logo-badge">R</div>
      <div class="logo-text">
        <strong>RugbyCoach</strong>
        <span>RCA Cergy Pontoise</span>
      </div>
    </div>

    <h1>Bienvenue sur<br>le <em>terrain.</em></h1>
    <p class="subtitle">Pilotez votre saison, suivez chaque joueur,<br>analysez les chiffres.</p>

    <div class="field-label">Email coach</div>
    <input type="email" id="email" placeholder="coach@rca-cergy.fr" autocomplete="email">

    <div class="field-label">Mot de passe</div>
    <input type="password" id="password" placeholder="••••••••••" autocomplete="current-password">

    <div class="error-msg" id="error"></div>

    <button class="btn-login" id="btnLogin">
      Entrer dans le vestiaire →
    </button>
    <p class="forgot">Mot de passe oublié ?</p>
  </div>

  <script>
    document.getElementById('btnLogin').addEventListener('click', async () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('btnLogin');
      const err = document.getElementById('error');

      if (!email || !password) {
        err.textContent = 'Remplis tous les champs.';
        err.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Connexion...';
      err.style.display = 'none';

      try {
        await login(email, password);
        window.location.href = 'dashboard.html';
      } catch (e) {
        err.textContent = 'Email ou mot de passe incorrect.';
        err.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = 'Entrer dans le vestiaire →';
      }
    });

    document.getElementById('password').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') document.getElementById('btnLogin').click();
    });

    (async () => {
      const user = await getUser();
      if (user) window.location.href = 'dashboard.html';
    })();
  </script>
</body>
</html>
