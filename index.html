<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>RugbyCoach — RCACP 95</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0e15">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Roboto+Condensed:ital,wght@0,700;0,800;0,900;1,700;1,800;1,900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/auth.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Roboto", system-ui, sans-serif;
      background: #0a0e15;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    .rc-login {
      width: 100%;
      max-width: 390px;
      min-height: 100vh;
      background: #0a0e15;
      display: flex;
      flex-direction: column;
      padding: 70px 28px 28px;
      position: relative;
      overflow: hidden;
    }

    /* Dégradés de fond */
    .rc-login::before {
      content: "";
      position: absolute; inset: 0; pointer-events: none;
      background:
        radial-gradient(80% 50% at 100% 0%, rgba(255,216,58,0.18), transparent 60%),
        radial-gradient(70% 50% at 0% 100%, rgba(239,67,67,0.22), transparent 60%);
    }

    /* Halftone dots */
    .rc-login::after {
      content: "";
      position: absolute; inset: 0; pointer-events: none;
      background-image: radial-gradient(rgba(255,255,255,0.08) 1px, transparent 1px);
      background-size: 16px 16px;
      mix-blend-mode: overlay;
      opacity: 0.5;
    }

    .rc-login > * { position: relative; z-index: 1; }

    /* LOGO */
    .rc-login-logo {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 36px;
    }

    .rc-login-mark {
      width: 56px; height: 56px;
      border-radius: 16px;
      background: #ffd83a;
      color: #0a0e15;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: "Roboto Condensed", sans-serif;
      font-size: 28px;
      font-weight: 900;
      font-style: italic;
      letter-spacing: -0.04em;
      flex-shrink: 0;
    }

    .rc-login-wordmark {
      font-family: "Roboto Condensed", sans-serif;
      font-weight: 900;
      font-size: 18px;
      letter-spacing: -0.01em;
      line-height: 1;
      color: #fff;
    }

    .rc-login-wordmark small {
      display: block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.16em;
      opacity: 0.6;
      margin-top: 4px;
      text-transform: uppercase;
      font-family: "Roboto", sans-serif;
    }

    /* TITRE */
    .rc-login h1 {
      font-family: "Roboto Condensed", sans-serif;
      font-size: 44px;
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 0.92;
      margin-bottom: 12px;
      color: #fff;
    }

    .rc-login h1 em {
      font-style: italic;
      background: linear-gradient(90deg, #ffd83a 0%, #ef4343 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .rc-login-sub {
      font-size: 14px;
      opacity: 0.7;
      margin-bottom: 40px;
      line-height: 1.5;
      color: #fff;
    }

    /* FIELDS */
    .rc-field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 14px;
    }

    .rc-field-lbl {
      font-family: "Roboto Condensed", sans-serif;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
    }

    .rc-input {
      height: 52px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 0 16px;
      font: 15px "Roboto", sans-serif;
      color: #fff;
      background: rgba(255,255,255,0.05);
      outline: none;
      backdrop-filter: blur(8px);
      transition: border-color 0.2s, background 0.2s;
      width: 100%;
    }

    .rc-input:focus {
      border-color: #ffd83a;
      background: rgba(255,255,255,0.08);
    }

    .rc-input::placeholder { color: rgba(255,255,255,0.2); }

    /* BOUTON */
    .rc-btn {
      width: 100%;
      height: 54px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      font-family: "Roboto Condensed", sans-serif;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.01em;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 12px;
    }

    .rc-btn.primary {
      background: #ffd83a;
      color: #0a0e15;
    }

    .rc-btn.primary:hover { opacity: 0.92; }
    .rc-btn.primary:active { transform: scale(0.98); }
    .rc-btn.primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .rc-btn.ghost {
      background: transparent;
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      font-weight: 500;
      font-family: "Roboto", sans-serif;
      margin-top: 4px;
    }

    .rc-btn.ghost:hover { color: rgba(255,255,255,0.9); }

    /* ERREUR */
    .error-msg {
      background: rgba(239,67,67,0.12);
      border: 1px solid rgba(239,67,67,0.3);
      border-radius: 10px;
      color: #ff8080;
      font-size: 13px;
      padding: 12px 16px;
      margin-bottom: 8px;
      display: none;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="rc-login">

    <div class="rc-login-logo">
      <div class="rc-login-mark">R</div>
      <div class="rc-login-wordmark">
        RugbyCoach
        <small>RCA Cergy Pontoise</small>
      </div>
    </div>

    <h1>Bienvenue sur<br>le <em>terrain.</em></h1>
    <p class="rc-login-sub">Pilotez votre saison, suivez chaque joueur,<br>analysez les chiffres.</p>

    <div class="rc-field">
      <label class="rc-field-lbl">Email coach</label>
      <input class="rc-input" type="email" id="email" placeholder="coach@rca-cergy.fr" autocomplete="email">
    </div>

    <div class="rc-field">
      <label class="rc-field-lbl">Mot de passe</label>
      <input class="rc-input" type="password" id="password" placeholder="••••••••••" autocomplete="current-password">
    </div>

    <div class="error-msg" id="error"></div>

    <button class="rc-btn primary" id="btnLogin">
      Entrer dans le vestiaire →
    </button>

    <button class="rc-btn ghost">
      Mot de passe oublié ?
    </button>

  </div>

  <script>
    document.getElementById('btnLogin').addEventListener('click', async () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('btnLogin');
      const err = document.getElementById('error');

      if (!email || !password) {
        err.textContent = 'Remplis tous les champs.';
        err.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Connexion...';
      err.style.display = 'none';

      try {
        await login(email, password);
        window.location.href = 'dashboard.html';
      } catch (e) {
        err.textContent = 'Email ou mot de passe incorrect.';
        err.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = 'Entrer dans le vestiaire →';
      }
    });

    document.getElementById('password').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') document.getElementById('btnLogin').click();
    });

    (async () => {
      const user = await getUser();
      if (user) window.location.href = 'dashboard.html';
    })();
  </script>
</body>
</html>
