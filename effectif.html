<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Effectif — RugbyCoach</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0e15">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Roboto+Condensed:ital,wght@0,700;0,800;0,900;1,700;1,800;1,900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/auth.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0e15; --bg2: #131a26; --surface: #161e2c; --surface2: #1c2535;
      --border: #243049; --border-strong: #2f3d5a;
      --fg: #f4ecdb; --fg-mute: #9aa5b8; --fg-faint: #6b7689;
      --yellow: #ffd83a; --red: #ef4343;
      --display: "Roboto Condensed", system-ui, sans-serif;
      --sans: "Roboto", system-ui, sans-serif;
    }
    body { font-family: var(--sans); background: var(--bg); color: var(--fg); max-width: 390px; margin: 0 auto; padding-bottom: 90px; -webkit-font-smoothing: antialiased; }

    .appbar { display: flex; align-items: center; gap: 12px; padding: 14px 18px 16px; }
    .back-btn { width: 40px; height: 40px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); color: var(--fg); display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 20px; flex-shrink: 0; }
    .appbar h1 { font-family: var(--display); font-size: 22px; font-weight: 900; letter-spacing: -0.02em; }
    .add-btn { margin-left: auto; background: var(--yellow); color: var(--bg); border: none; border-radius: 10px; padding: 9px 16px; font-family: var(--display); font-size: 13px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 6px; }

    .segments { display: flex; background: var(--bg2); border-radius: 12px; padding: 4px; border: 1px solid var(--border); margin: 0 18px 16px; }
    .segment { flex: 1; background: transparent; border: 0; padding: 9px 8px; font-family: var(--display); font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-mute); cursor: pointer; border-radius: 8px; transition: all 0.15s; }
    .segment.active { background: var(--bg); color: var(--yellow); border: 1px solid var(--border-strong); }

    .search-wrap { padding: 0 18px 12px; }
    .search-input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; color: var(--fg); font-size: 14px; font-family: var(--sans); outline: none; transition: border-color 0.2s; }
    .search-input:focus { border-color: var(--yellow); }
    .search-input::placeholder { color: var(--fg-faint); }

    .filter-row { display: flex; gap: 8px; padding: 0 18px 16px; overflow-x: auto; scrollbar-width: none; }
    .filter-row::-webkit-scrollbar { display: none; }
    .filter-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; color: var(--fg-mute); font-family: var(--display); font-size: 11px; font-weight: 700; white-space: nowrap; cursor: pointer; text-transform: uppercase; letter-spacing: 0.06em; transition: all 0.15s; }
    .filter-btn.active { background: var(--yellow); color: var(--bg); border-color: var(--yellow); }

    .player-list { padding: 0 18px; display: flex; flex-direction: column; gap: 8px; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; overflow: hidden; box-shadow: 0 1px 0 rgba(255,255,255,0.02), 0 8px 24px -12px rgba(0,0,0,0.6); }

    .player-row { display: flex; align-items: center; gap: 14px; padding: 14px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; }
    .player-row:last-child { border-bottom: 0; }
    .player-row:active { background: var(--bg2); }

    .player-avatar { width: 44px; height: 44px; border-radius: 13px; background: var(--bg2); display: flex; align-items: center; justify-content: center; font-family: var(--display); font-size: 15px; font-weight: 900; font-style: italic; color: var(--yellow); flex-shrink: 0; }
    .player-avatar.cap { border: 2px solid var(--yellow); }

    .player-info { flex: 1; }
    .player-name { font-size: 14px; font-weight: 700; color: var(--fg); margin-bottom: 3px; }
    .player-meta { font-size: 12px; color: var(--fg-mute); display: flex; align-items: center; gap: 6px; }
    .pos-chip { display: inline-flex; align-items: center; justify-content: center; padding: 2px 6px; border-radius: 4px; font-family: var(--display); font-size: 10px; font-weight: 800; background: rgba(30,59,138,0.2); color: #7b9bf0; }

    .player-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
    .numero { font-family: var(--display); font-size: 20px; font-weight: 900; color: var(--yellow); font-style: italic; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; }
    .status-dot.fit { background: #1ac057; }
    .status-dot.out { background: var(--red); }

    .card-actions { display: flex; gap: 6px; }
    .act-btn { width: 30px; height: 30px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg2); color: var(--fg-mute); display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; transition: all 0.15s; }
    .act-btn:hover { border-color: var(--yellow); color: var(--yellow); }
    .act-btn.archive:hover { border-color: var(--red); color: var(--red); }
    .act-btn.restore:hover { border-color: #1ac057; color: #1ac057; }

    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; display: none; align-items: flex-end; justify-content: center; backdrop-filter: blur(4px); }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border-radius: 24px 24px 0 0; padding: 24px 20px 40px; width: 100%; max-width: 390px; max-height: 88vh; overflow-y: auto; border-top: 1px solid var(--border-strong); }
    .modal-handle { width: 40px; height: 4px; border-radius: 2px; background: var(--border-strong); margin: 0 auto 20px; }
    .modal-title { font-family: var(--display); font-size: 20px; font-weight: 900; letter-spacing: -0.02em; margin-bottom: 20px; }
    .field-label { font-family: var(--display); font-size: 10px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; color: var(--fg-mute); margin-bottom: 8px; }
    .field-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 13px 16px; color: var(--fg); font-size: 15px; font-family: var(--sans); margin-bottom: 16px; outline: none; transition: border-color 0.2s; }
    .field-input:focus { border-color: var(--yellow); }
    select.field-input { appearance: none; }
    .modal-actions { display: flex; gap: 10px; margin-top: 8px; }
    .btn-cancel { flex: 1; background: var(--bg2); color: var(--fg-mute); border: 1px solid var(--border); border-radius: 12px; padding: 14px; font-family: var(--display); font-size: 14px; font-weight: 700; cursor: pointer; }
    .btn-save { flex: 2; background: var(--yellow); color: var(--bg); border: none; border-radius: 12px; padding: 14px; font-family: var(--display); font-size: 15px; font-weight: 800; cursor: pointer; }

    .empty { color: var(--fg-faint); font-size: 13px; text-align: center; padding: 40px 20px; }

    .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 390px; background: var(--surface); border-top: 1px solid var(--border); display: flex; align-items: center; padding: 10px 0 24px; z-index: 100; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; text-decoration: none; cursor: pointer; background: none; border: none; }
    .nav-item span { font-family: var(--display); font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-faint); }
    .nav-item.active span { color: var(--yellow); }
    .nav-item i { font-size: 22px; color: var(--fg-faint); }
    .nav-item.active i { color: var(--yellow); }
    .nav-center { flex: 1; display: flex; justify-content: center; }
    .nav-fab { width: 52px; height: 52px; background: var(--yellow); color: var(--bg); border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 26px; margin-top: -20px; box-shadow: 0 6px 16px rgba(255,216,58,0.4); }
  </style>
</head>
<body>

  <div class="appbar">
    <a href="dashboard.html" class="back-btn"><i class="ri-arrow-left-s-line"></i></a>
    <h1>Effectif</h1>
    <button class="add-btn" onclick="openModal()"><i class="ri-add-line"></i> Joueur</button>
  </div>

  <div class="segments">
    <button class="segment active" onclick="switchTab('actifs', this)">Actifs</button>
    <button class="segment" onclick="switchTab('archives', this)">Archives</button>
  </div>

  <div class="search-wrap">
    <input class="search-input" id="searchInput" placeholder="🔍 Rechercher un joueur..." oninput="renderJoueurs()">
  </div>

  <div class="filter-row" id="filterRow">
    <button class="filter-btn active" onclick="setFilter('tous', this)">Tous</button>
    <button class="filter-btn" onclick="setFilter('Pilier', this)">Piliers</button>
    <button class="filter-btn" onclick="setFilter('Talonneur', this)">Talonneurs</button>
    <button class="filter-btn" onclick="setFilter('Deuxième ligne', this)">2e ligne</button>
    <button class="filter-btn" onclick="setFilter('Troisième ligne', this)">3e ligne</button>
    <button class="filter-btn" onclick="setFilter('Demi', this)">Demis</button>
    <button class="filter-btn" onclick="setFilter('Centre', this)">Centres</button>
    <button class="filter-btn" onclick="setFilter('Ailier', this)">Ailiers</button>
    <button class="filter-btn" onclick="setFilter('Arrière', this)">Arrières</button>
  </div>

  <div class="player-list" id="playerList">
    <div class="card"><p class="empty">Chargement...</p></div>
  </div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title" id="modalTitle">Nouveau joueur</div>

      <div class="field-label">Prénom *</div>
      <input class="field-input" id="newPrenom" placeholder="Thomas">
      <div class="field-label">Nom *</div>
      <input class="field-input" id="newNom" placeholder="Dupont">
      <div class="field-label">Numéro</div>
      <input class="field-input" id="newNumero" type="number" placeholder="9">
      <div class="field-label">Poste *</div>
      <select class="field-input" id="newPoste">
        <option value="">Choisir un poste</option>
        <option>Pilier gauche</option>
        <option>Talonneur</option>
        <option>Pilier droit</option>
        <option>Deuxième ligne</option>
        <option>Troisième ligne aile</option>
        <option>Troisième ligne centre</option>
        <option>Demi de mêlée</option>
        <option>Demi d'ouverture</option>
        <option>Centre</option>
        <option>Ailier</option>
        <option>Arrière</option>
      </select>
      <div class="field-label">Téléphone</div>
      <input class="field-input" id="newTel" placeholder="06 12 34 56 78">
      <div class="field-label">Email</div>
      <input class="field-input" id="newEmail" type="email" placeholder="joueur@email.fr">
      <div class="field-label">Poids (kg)</div>
      <input class="field-input" id="newPoids" type="number" placeholder="90">
      <div class="field-label">Taille (cm)</div>
      <input class="field-input" id="newTaille" type="number" placeholder="185">

      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Annuler</button>
        <button class="btn-save" id="btnSave" onclick="saveJoueur()">Ajouter</button>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item">
      <i class="ri-home-5-line"></i><span>Accueil</span>
    </a>
    <a href="effectif.html" class="nav-item active">
      <i class="ri-group-fill"></i><span>Effectif</span>
    </a>
    <div class="nav-center">
      <button class="nav-fab" onclick="openModal()"><i class="ri-add-line"></i></button>
    </div>
    <a href="seances.html" class="nav-item">
      <i class="ri-calendar-line"></i><span>Séances</span>
    </a>
    <a href="sante.html" class="nav-item">
      <i class="ri-heart-pulse-line"></i><span>Santé</span>
    </a>
  </nav>

  <script>
    let allJoueurs = [];
    let currentFilter = 'tous';
    let currentTab = 'actifs';
    let editingId = null;

    (async () => {
      await requireAuth();
      await loadJoueurs();
    })();

    async function loadJoueurs() {
      const { data } = await window.supabaseClient.from('joueurs').select('*').order('numero', { ascending: true });
      allJoueurs = data || [];
      renderJoueurs();
    }

    function switchTab(tab, el) {
      currentTab = tab;
      document.querySelectorAll('.segment').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('filterRow').style.display = tab === 'actifs' ? 'flex' : 'none';
      renderJoueurs();
    }

    function renderJoueurs() {
      const list = document.getElementById('playerList');
      const q = document.getElementById('searchInput').value.toLowerCase();
      let filtered = allJoueurs.filter(j => currentTab === 'actifs' ? !j.archive : j.archive);
      if (currentFilter !== 'tous') filtered = filtered.filter(j => j.poste && j.poste.toLowerCase().includes(currentFilter.toLowerCase()));
      if (q) filtered = filtered.filter(j => `${j.prenom} ${j.nom}`.toLowerCase().includes(q));

      if (!filtered.length) {
        list.innerHTML = `<div class="card"><p class="empty">${currentTab === 'actifs' ? 'Aucun joueur — ajoute le premier 🏉' : 'Aucun joueur archivé'}</p></div>`;
        return;
      }

      list.innerHTML = `<div class="card">${filtered.map(j => `
        <div class="player-row">
          <div class="player-avatar ${j.capitaine ? 'cap' : ''}" onclick="window.location.href='joueur.html?id=${j.id}'">
            ${j.prenom.charAt(0)}${j.nom.charAt(0)}
          </div>
          <div class="player-info" onclick="window.location.href='joueur.html?id=${j.id}'">
            <div class="player-name">${j.prenom} ${j.nom} ${j.capitaine ? '⭐' : ''}</div>
            <div class="player-meta">
              <span class="pos-chip">${j.poste ? j.poste.substring(0,3).toUpperCase() : '—'}</span>
              ${j.poste || '—'}
            </div>
          </div>
          <div class="player-right">
            <div class="numero">${j.numero || '—'}</div>
            <div class="card-actions">
              ${currentTab === 'actifs' ? `
                <button class="act-btn" onclick="openEdit(${j.id})" title="Modifier"><i class="ri-edit-line"></i></button>
                <button class="act-btn archive" onclick="archiverJoueur(${j.id})" title="Archiver"><i class="ri-archive-line"></i></button>
              ` : `
                <button class="act-btn restore" onclick="desarchiverJoueur(${j.id})" title="Désarchiver"><i class="ri-refresh-line"></i></button>
              `}
            </div>
          </div>
        </div>`).join('')}</div>`;
    }

    function setFilter(poste, btn) {
      currentFilter = poste;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderJoueurs();
    }

    function openModal() {
      editingId = null;
      document.getElementById('modalTitle').textContent = 'Nouveau joueur';
      document.getElementById('btnSave').textContent = 'Ajouter';
      ['newPrenom','newNom','newNumero','newTel','newEmail','newPoids','newTaille'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('newPoste').value = '';
      document.getElementById('modalOverlay').classList.add('open');
    }

    function openEdit(id) {
      const j = allJoueurs.find(x => x.id === id);
      if (!j) return;
      editingId = id;
      document.getElementById('modalTitle').textContent = 'Modifier le joueur';
      document.getElementById('btnSave').textContent = 'Enregistrer';
      document.getElementById('newPrenom').value = j.prenom || '';
      document.getElementById('newNom').value = j.nom || '';
      document.getElementById('newNumero').value = j.numero || '';
      document.getElementById('newPoste').value = j.poste || '';
      document.getElementById('newTel').value = j.telephone || '';
      document.getElementById('newEmail').value = j.email || '';
      document.getElementById('newPoids').value = j.poids || '';
      document.getElementById('newTaille').value = j.taille || '';
      document.getElementById('modalOverlay').classList.add('open');
    }

    function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

    async function saveJoueur() {
      const prenom = document.getElementById('newPrenom').value.trim();
      const nom = document.getElementById('newNom').value.trim();
      const poste = document.getElementById('newPoste').value;
      if (!prenom || !nom || !poste) { alert('Prénom, nom et poste sont obligatoires.'); return; }
      const data = { prenom, nom, poste, numero: document.getElementById('newNumero').value || null, telephone: document.getElementById('newTel').value.trim() || null, email: document.getElementById('newEmail').value.trim() || null, poids: document.getElementById('newPoids').value || null, taille: document.getElementById('newTaille').value || null };
      if (editingId) {
        await window.supabaseClient.from('joueurs').update(data).eq('id', editingId);
      } else {
        await window.supabaseClient.from('joueurs').insert({ ...data, disponible: true, saison: '2025-2026' });
      }
      closeModal();
      await loadJoueurs();
    }

    async function archiverJoueur(id) {
      if (!confirm('Archiver ce joueur ?')) return;
      await window.supabaseClient.from('joueurs').update({ archive: true }).eq('id', id);
      await loadJoueurs();
    }

    async function desarchiverJoueur(id) {
      await window.supabaseClient.from('joueurs').update({ archive: false }).eq('id', id);
      await loadJoueurs();
    }
  </script>
</body>
</html>
