<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Effectif — RugbyCoach</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/auth.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #111; color: #fff; max-width: 390px; margin: 0 auto; padding-bottom: 80px; }

    .header { padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
    .back-btn { width: 36px; height: 36px; background: #1e1e1e; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; text-decoration: none; }
    .header h1 { font-size: 18px; font-weight: 700; }
    .add-btn { margin-left: auto; background: #F59E0B; color: #111; border: none; border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer; }

    .tabs { display: flex; border-bottom: 0.5px solid #2a2a2a; padding: 0 20px; margin-bottom: 16px; }
    .tab { flex: 1; padding: 12px 0; text-align: center; font-size: 13px; font-weight: 500; color: #666; cursor: pointer; border-bottom: 2px solid transparent; }
    .tab.active { color: #F59E0B; border-bottom-color: #F59E0B; }

    .search-wrap { padding: 0 20px 16px; }
    .search-input { width: 100%; background: #1e1e1e; border: 0.5px solid #2a2a2a; border-radius: 10px; padding: 12px 16px; color: #fff; font-size: 14px; outline: none; }
    .search-input::placeholder { color: #444; }

    .filter-row { display: flex; gap: 8px; padding: 0 20px 16px; overflow-x: auto; scrollbar-width: none; }
    .filter-row::-webkit-scrollbar { display: none; }
    .filter-btn { background: #1e1e1e; border: 0.5px solid #2a2a2a; border-radius: 20px; padding: 6px 14px; color: #888; font-size: 12px; white-space: nowrap; cursor: pointer; }
    .filter-btn.active { background: #F59E0B; color: #111; border-color: #F59E0B; font-weight: 600; }

    .player-list { padding: 0 20px; }
    .player-card { background: #1e1e1e; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; }
    .player-avatar { width: 42px; height: 42px; border-radius: 50%; background: #2a2a2a; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: #F59E0B; flex-shrink: 0; cursor: pointer; }
    .player-avatar.capitaine { border: 2px solid #F59E0B; }
    .player-info { flex: 1; cursor: pointer; }
    .player-name { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
    .player-meta { font-size: 12px; color: #666; }
    .player-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
    .numero { font-size: 18px; font-weight: 700; color: #F59E0B; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; }
    .status-dot.fit { background: #27ae60; }
    .status-dot.out { background: #C0392B; }
    .card-actions { display: flex; gap: 6px; }
    .action-btn-sm { width: 28px; height: 28px; border-radius: 6px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 13px; }
    .btn-edit { background: #2a2a2a; }
    .btn-archive { background: #3a1a1a; }

    .archive-badge { background: #2a2a2a; color: #666; font-size: 10px; padding: 2px 8px; border-radius: 20px; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #1a1a1a; border-radius: 20px 20px 0 0; padding: 24px 20px; width: 100%; max-width: 390px; max-height: 85vh; overflow-y: auto; }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
    .field-label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; font-weight: 600; }
    .field-input { width: 100%; background: #111; border: 0.5px solid #2a2a2a; border-radius: 10px; padding: 12px 14px; color: #fff; font-size: 14px; margin-bottom: 16px; outline: none; }
    .field-input:focus { border-color: #F59E0B; }
    select.field-input { appearance: none; }
    .modal-actions { display: flex; gap: 10px; margin-top: 8px; }
    .btn-cancel { flex: 1; background: #2a2a2a; color: #fff; border: none; border-radius: 10px; padding: 14px; font-size: 15px; cursor: pointer; }
    .btn-save { flex: 2; background: #F59E0B; color: #111; border: none; border-radius: 10px; padding: 14px; font-size: 15px; font-weight: 600; cursor: pointer; }

    .empty { color: #444; font-size: 13px; text-align: center; padding: 40px 20px; }

    .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 390px; background: #1a1a1a; border-top: 0.5px solid #2a2a2a; display: flex; align-items: center; padding: 8px 0; z-index: 100; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; text-decoration: none; cursor: pointer; background: none; border: none; }
    .nav-item span { font-size: 10px; color: #666; }
    .nav-item.active span { color: #F59E0B; }
    .nav-item svg { opacity: 0.4; }
    .nav-item.active svg { opacity: 1; }
    .nav-center { flex: 1; display: flex; justify-content: center; }
    .nav-plus { width: 48px; height: 48px; background: #F59E0B; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; margin-top: -20px; box-shadow: 0 4px 12px rgba(245,158,11,0.4); }
  </style>
</head>
<body>

  <div class="header">
    <a href="dashboard.html" class="back-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <h1>Effectif</h1>
    <button class="add-btn" onclick="openModal()">+ Joueur</button>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('actifs', this)">Actifs</div>
    <div class="tab" onclick="switchTab('archives', this)">Archives</div>
  </div>

  <div class="search-wrap">
    <input class="search-input" id="searchInput" placeholder="🔍 Rechercher un joueur..." oninput="filterJoueurs()">
  </div>

  <div class="filter-row" id="filterRow">
    <button class="filter-btn active" onclick="setFilter('tous', this)">Tous</button>
    <button class="filter-btn" onclick="setFilter('Pilier', this)">Piliers</button>
    <button class="filter-btn" onclick="setFilter('Talonneur', this)">Talonneurs</button>
    <button class="filter-btn" onclick="setFilter('Deuxième ligne', this)">2e ligne</button>
    <button class="filter-btn" onclick="setFilter('Troisième ligne', this)">3e ligne</button>
    <button class="filter-btn" onclick="setFilter('Demi de mêlée', this)">Demis</button>
    <button class="filter-btn" onclick="setFilter('Demi d\'ouverture', this)">Ouvreurs</button>
    <button class="filter-btn" onclick="setFilter('Centre', this)">Centres</button>
    <button class="filter-btn" onclick="setFilter('Ailier', this)">Ailiers</button>
    <button class="filter-btn" onclick="setFilter('Arrière', this)">Arrières</button>
  </div>

  <div class="player-list" id="playerList">
    <p class="empty">Chargement...</p>
  </div>

  <!-- MODAL AJOUT / MODIFICATION -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-title" id="modalTitle">Nouveau joueur</div>

      <div class="field-label">Prénom *</div>
      <input class="field-input" id="newPrenom" placeholder="Thomas">

      <div class="field-label">Nom *</div>
      <input class="field-input" id="newNom" placeholder="Dupont">

      <div class="field-label">Numéro</div>
      <input class="field-input" id="newNumero" type="number" placeholder="9">

      <div class="field-label">Poste *</div>
      <select class="field-input" id="newPoste">
        <option value="">Choisir un poste</option>
        <option>Pilier gauche</option>
        <option>Talonneur</option>
        <option>Pilier droit</option>
        <option>Deuxième ligne</option>
        <option>Troisième ligne aile</option>
        <option>Troisième ligne centre</option>
        <option>Demi de mêlée</option>
        <option>Demi d'ouverture</option>
        <option>Centre</option>
        <option>Ailier</option>
        <option>Arrière</option>
      </select>

      <div class="field-label">Téléphone</div>
      <input class="field-input" id="newTel" placeholder="06 12 34 56 78">

      <div class="field-label">Email</div>
      <input class="field-input" id="newEmail" type="email" placeholder="joueur@email.fr">

      <div class="field-label">Poids (kg)</div>
      <input class="field-input" id="newPoids" type="number" placeholder="90">

      <div class="field-label">Taille (cm)</div>
      <input class="field-input" id="newTaille" type="number" placeholder="185">

      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Annuler</button>
        <button class="btn-save" id="btnSave" onclick="saveJoueur()">Ajouter</button>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      <span>Accueil</span>
    </a>
    <a href="effectif.html" class="nav-item active">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#F59E0B" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span>Effectif</span>
    </a>
    <div class="nav-center">
      <button class="nav-plus" onclick="openModal()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
    <a href="seances.html" class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>Séances</span>
    </a>
    <a href="sante.html" class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
      <span>Santé</span>
    </a>
  </nav>

  <script>
    let allJoueurs = [];
    let currentFilter = 'tous';
    let currentTab = 'actifs';
    let editingId = null;

    (async () => {
      await requireAuth();
      await loadJoueurs();
    })();

    async function loadJoueurs() {
      const { data } = await window.supabaseClient
        .from('joueurs').select('*').order('numero', { ascending: true });
      allJoueurs = data || [];
      renderJoueurs();
    }

    function switchTab(tab, el) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('filterRow').style.display = tab === 'actifs' ? 'flex' : 'none';
      renderJoueurs();
    }

    function renderJoueurs() {
      const list = document.getElementById('playerList');
      const q = document.getElementById('searchInput').value.toLowerCase();
      let filtered = allJoueurs.filter(j => currentTab === 'actifs' ? !j.archive : j.archive);
      if (currentFilter !== 'tous') filtered = filtered.filter(j => j.poste && j.poste.includes(currentFilter));
      if (q) filtered = filtered.filter(j => `${j.prenom} ${j.nom}`.toLowerCase().includes(q));

      if (!filtered.length) {
        list.innerHTML = `<p class="empty">${currentTab === 'actifs' ? 'Aucun joueur actif' : 'Aucun joueur archivé'}</p>`;
        return;
      }

      list.innerHTML = filtered.map(j => `
        <div class="player-card">
          <div class="player-avatar ${j.capitaine ? 'capitaine' : ''}" onclick="window.location.href='joueur.html?id=${j.id}'">
            ${j.prenom.charAt(0)}${j.nom.charAt(0)}
          </div>
          <div class="player-info" onclick="window.location.href='joueur.html?id=${j.id}'">
            <div class="player-name">${j.prenom} ${j.nom} ${j.capitaine ? '⭐' : ''}</div>
            <div class="player-meta">${j.poste || '—'}</div>
          </div>
          <div class="player-right">
            <div class="numero">${j.numero || '—'}</div>
            <div class="card-actions">
              ${currentTab === 'actifs' ? `
                <button class="action-btn-sm btn-edit" onclick="openEdit(${j.id})" title="Modifier">✏️</button>
                <button class="action-btn-sm btn-archive" onclick="archiverJoueur(${j.id})" title="Archiver">📦</button>
              ` : `
                <button class="action-btn-sm btn-edit" onclick="desarchiverJoueur(${j.id})" title="Désarchiver" style="background:#1a3a1a">♻️</button>
              `}
            </div>
          </div>
        </div>`).join('');
    }

    function setFilter(poste, btn) {
      currentFilter = poste;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderJoueurs();
    }

    function filterJoueurs() { renderJoueurs(); }

    function openModal() {
      editingId = null;
      document.getElementById('modalTitle').textContent = 'Nouveau joueur';
      document.getElementById('btnSave').textContent = 'Ajouter';
      ['newPrenom','newNom','newNumero','newTel','newEmail','newPoids','newTaille'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('newPoste').value = '';
      document.getElementById('modalOverlay').classList.add('open');
    }

    function openEdit(id) {
      const j = allJoueurs.find(x => x.id === id);
      if (!j) return;
      editingId = id;
      document.getElementById('modalTitle').textContent = 'Modifier le joueur';
      document.getElementById('btnSave').textContent = 'Enregistrer';
      document.getElementById('newPrenom').value = j.prenom || '';
      document.getElementById('newNom').value = j.nom || '';
      document.getElementById('newNumero').value = j.numero || '';
      document.getElementById('newPoste').value = j.poste || '';
      document.getElementById('newTel').value = j.telephone || '';
      document.getElementById('newEmail').value = j.email || '';
      document.getElementById('newPoids').value = j.poids || '';
      document.getElementById('newTaille').value = j.taille || '';
      document.getElementById('modalOverlay').classList.add('open');
    }

    function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

    async function saveJoueur() {
      const prenom = document.getElementById('newPrenom').value.trim();
      const nom = document.getElementById('newNom').value.trim();
      const poste = document.getElementById('newPoste').value;
      if (!prenom || !nom || !poste) { alert('Prénom, nom et poste sont obligatoires.'); return; }

      const data = {
        prenom, nom, poste,
        numero: document.getElementById('newNumero').value || null,
        telephone: document.getElementById('newTel').value.trim() || null,
        email: document.getElementById('newEmail').value.trim() || null,
        poids: document.getElementById('newPoids').value || null,
        taille: document.getElementById('newTaille').value || null,
      };

      if (editingId) {
        await window.supabaseClient.from('joueurs').update(data).eq('id', editingId);
      } else {
        await window.supabaseClient.from('joueurs').insert({ ...data, disponible: true, saison: '2025-2026' });
      }
      closeModal();
      await loadJoueurs();
    }

    async function archiverJoueur(id) {
      if (!confirm('Archiver ce joueur ?')) return;
      await window.supabaseClient.from('joueurs').update({ archive: true }).eq('id', id);
      await loadJoueurs();
    }

    async function desarchiverJoueur(id) {
      await window.supabaseClient.from('joueurs').update({ archive: false }).eq('id', id);
      await loadJoueurs();
    }
  </script>
</body>
</html>
